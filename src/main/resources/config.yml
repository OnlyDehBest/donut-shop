# ==========================================
#          DonutShop - Configuration
# ==========================================

# Do NOT change this value manually. It is used to detect config format changes.
config-version: 4

main-inventory:
  title: 's ЬбіПбіШ'
  layout:
    - 'XXXXXXXXX'
    - 'XXOOOOOXX'
    - '<XXXXXXX>'

add-stack-item:
  display-name: '<green>Add <amount>'
  type: LIME_STAINED_GLASS_PANE

remove-stack-item:
  display-name: '<red>Remove <amount>'
  type: RED_STAINED_GLASS_PANE

set-to-min-item:
  display-name: '<gold>Set to <amount>'
  type: ORANGE_STAINED_GLASS_PANE

set-to-max-item:
  display-name: '<gold>Set to <amount>'
  type: ORANGE_STAINED_GLASS_PANE

categories:
  end:
    # Set to false to disable the category.
    enabled: true
    slot: 12
    rows: 3
    icon:
      display-name: '<green>біЗ…ібіЕ'
      type: ENDER_CHEST
      lore:
        - '<white>Click to view the end shop'
    inventory-name: '<dark_gray>s ЬбіПбіШ - біЗ…ібіЕ'
    layout:
      - 'XXXXXXXXX'
      - 'OOOOOOOOO'
      - '<XXXXXXX>'
  nether:
    enabled: true
    slot: 15
    rows: 3
    icon:
      display-name: '<green>…ібіЗбіЫ ЬбіЗ А'
      type: RED_NETHER_BRICKS
      lore:
        - '<white>Click to view the nether shop'
    inventory-name: '<dark_gray>s ЬбіПбіШ - …ібіЗбіЫ ЬбіЗ А'
    layout:
      - 'XXXXXXXXX'
      - 'OOOOOOOOO'
      - '<XXXXXXX>'
  gear:
    enabled: true
    slot: 14
    rows: 3
    icon:
      display-name: '<green>…ҐбіЗбіА А'
      type: TOTEM_OF_UNDYING
      lore:
        - '<white>Click to view the gear shop'
    inventory-name: '<dark_gray>s ЬбіПбіШ - …ҐбіЗбіА А'
    layout:
      - 'XXXXXXXXX'
      - 'OOOOOOOOO'
      - '<XXXXXXX>'
  food:
    enabled: true
    slot: 13
    rows: 3
    icon:
      display-name: '<green>“УбіПбіПбіЕ'
      type: COOKED_BEEF
      lore:
        - '<white>Click to view the food shop'
    inventory-name: '<dark_gray>s ЬбіПбіШ - “УбіПбіПбіЕ'
    layout:
      - 'XXXXXXXXX'
      - 'OOOOOOOOO'
      - '<XXXXXXX>'
  shard:
    enabled: true
    slot: 11
    rows: 3
    icon:
      display-name: '<light_purple>s ЬбіА АбіЕ'
      type: AMETHYST_SHARD
      lore:
        - '<white>Click to view the shard shop'
    inventory-name: '<dark_gray>s ЬбіПбіШ - s ЬбіА АбіЕ'
    layout:
      - 'XXOOOOOXX'
      - 'OOOOOOOOO'
      - '<XXXXXXX>'

# Keep the confirm GUI open after a successful purchase instead of returning to the category.
keep-open-after-purchase: true

# Print in console everytime someone is buying something.
print-console:
  enabled: false

# Stamps purchased items with an NBT tag so they don't stack with vanilla items.
anti-dupe: true

# Enable verbose logging of custom-economy purchases (placeholder result, balance, price).
debug: false

items:
  filler:
    type: GRAY_STAINED_GLASS_PANE
    display-name: ''
    lore: []
  back-page:
    name: '<color:#e00202> ЩбіАбіДбіЛ'
    material: RED_STAINED_GLASS_PANE
    lore:
      - '<white>Click to return'
  next-page:
    name: '<color:#02de4f>…ібіЗxбіЫ'
    material: ARROW
    lore:
      - '<white>Click to go the next page'
  roll-back-page:
    name: '<color:#02de4f> АбіП Я Я ЩбіАбіДбіЛ'
    material: ARROW
    lore:
      - '<white>Click to go the previous page'
  decline:
    name: '<color:#e00202>біДбіА…ібіДбіЗ Я'
    material: RED_STAINED_GLASS_PANE
    lore:
      - '<white>Click to cancel'
  accept:
    name: '<color:#02de4f>біДбіП…і“У…™ АбіН'
    material: LIME_STAINED_GLASS_PANE
    lore:
      - '<white>Click to buy'

custom-economies:
  shards:
    display-name: 'Shards'
    balance-placeholder: '%player_shards%'
    take-command: 'shard take %player% %amount%'
    give-command: 'shard give %player% %amount%'

